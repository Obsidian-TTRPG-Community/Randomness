  <rect width="160" height="200" fill="#3a2a3a"/>
  <!-- accent border -->
  <rect x="3" y="3" width="154" height="194" fill="none" stroke="#a89dc8" stroke-width="2"/>
  <!-- head (skin-colour circle) -->
  <circle cx="50" cy="65" r="22" fill="#d4a37a" stroke="#a89dc8" stroke-width="1.5"/>
  <!-- body (rounded rect, accent-colour cloak) -->
  <path d="M 28 100 Q 28 90 50 88 Q 72 90 72 100 L 72 160 Q 50 170 28 160 Z" fill="#a89dc8" opacity="0.7"/>
  <!-- icon (class symbol) -->
  <path d="M 75 75 L 75 105 L 85 105 L 85 75 M 80 105 L 80 130 M 75 130 L 85 130" fill="none" stroke="#a89dc8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- name label -->
  <rect x="3" y="170" width="154" height="27" fill="#3a2a3a" opacity="0.85"/>
  <text x="80" y="188" font-family="Georgia, serif" font-size="13" fill="#a89dc8" text-anchor="middle" font-weight="bold">Halfling Rogue</text>
</svg>
