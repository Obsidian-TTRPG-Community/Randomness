<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <!-- background plate -->
  <rect width="160" height="200" fill="#5a2a3d"/>
  <!-- accent border -->
  <rect x="3" y="3" width="154" height="194" fill="none" stroke="#e8b899" stroke-width="2"/>
  <!-- head (skin-colour circle) -->
  <circle cx="50" cy="65" r="22" fill="#e8c8a8" stroke="#e8b899" stroke-width="1.5"/>
  <!-- body (rounded rect, accent-colour cloak) -->
  <path d="M 28 100 Q 28 90 50 88 Q 72 90 72 100 L 72 160 Q 50 170 28 160 Z" fill="#e8b899" opacity="0.7"/>
  <!-- icon (class symbol) -->
  <path d="M 80 75 Q 95 100 80 125 Q 65 100 80 75 M 75 90 L 85 90 M 75 100 L 85 100 M 75 110 L 85 110" fill="none" stroke="#e8b899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- name label -->
  <rect x="3" y="170" width="154" height="27" fill="#5a2a3d" opacity="0.85"/>
  <text x="80" y="188" font-family="Georgia, serif" font-size="13" fill="#e8b899" text-anchor="middle" font-weight="bold">Human Bard</text>
</svg>
